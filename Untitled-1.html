<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>NTU Lightware</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      background: #f4f5f7;
    }

    .main-wrapper {
      max-width: 1200px;
      margin: auto;
    }

    .radio-label {
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container-fluid">
    <div class="row min-vh-100 justify-content-center">
      <div class="col-12 p-4 d-flex justify-content-center">

        <div class="main-wrapper w-100">

          <h1 class="text-center fw-light mb-4">NTU Lightware</h1>

          <!-- INPUT -->
          <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4">

              <h3 class="mb-4 text-center">Input Selection</h3>

              <div class="row g-3">

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="input" id="Desktop" checked>
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="Desktop">
                    Desktop
                  </label>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="input" id="Laptop1">
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="Laptop1">
                    Laptop 1
                  </label>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="input" id="Laptop2">
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="Laptop2">
                    Laptop 2
                  </label>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="input" id="Spare">
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="Spare">
                    Spare
                  </label>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="input" id="WirelessPresentation">
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label"
                    for="WirelessPresentation">
                    Wireless Presentation
                  </label>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="input" id="visualizer">
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="visualizer">
                    Visualizer
                  </label>
                </div>

              </div>

            </div>
          </div>

          <!-- OUTPUT -->
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">

              <h3 class="mb-4 text-center">Output Selection</h3>

              <div class="row g-3">

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="tv" id="tv1" checked>
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="tv1">
                    TV 1
                  </label>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="tv" id="tv2">
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="tv2">
                    TV 2
                  </label>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="tv" id="tv3">
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="tv3">
                    TV 3
                  </label>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="tv" id="tv4">
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="tv4">
                    TV 4
                  </label>
                </div>

                <div class="col-12 col-sm-6 col-md-4">
                  <input type="radio" class="btn-check" name="tv" id="tv5">
                  <label class="btn btn-outline-primary w-100 rounded-4 py-3 fs-5 radio-label" for="tv5">
                    TV 5
                  </label>
                </div>

              </div>

            </div>
          </div>

        </div>

      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal fade" id="tvControlModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">

        <div class="modal-header">
          <h5 class="modal-title">Output Control Panel</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body text-center">

          <div id="modalSelectedTV" class="mb-3 text-muted">Select a TV</div>

          <div class="d-grid gap-3">
            <button id="btnOn" class="btn btn-success py-3 fs-5">ON</button>
            <button id="btnOff" class="btn btn-danger py-3 fs-5">OFF</button>
            <button id="btnMute" class="btn btn-warning py-3 fs-5">MUTE</button>
          </div>

        </div>

      </div>
    </div>
  </div>

  <!-- ROTATE DEVICE OVERLAY -->
  <div id="rotateOverlay">

    <div class="rotate-box">

      <div class="phone-icon">
        📱
      </div>

      <h3>Please Rotate Your Device</h3>

      <p>
        For the best experience, use landscape mode.
      </p>

    </div>

  </div>

  <style>
    /* ROTATE OVERLAY */

    #rotateOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 9999;

      display: none;
      align-items: center;
      justify-content: center;

      color: white;
      text-align: center;
      padding: 20px;
    }

    .rotate-box {
      max-width: 300px;
    }

    .phone-icon {
      font-size: 80px;
      margin-bottom: 20px;

      animation: rotatePhone 1.5s ease-in-out infinite;
    }

    @keyframes rotatePhone {
      0% {
        transform: rotate(0deg);
      }

      25% {
        transform: rotate(-90deg);
      }

      50% {
        transform: rotate(-90deg);
      }

      75% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }
  </style>

  <script>

    function checkOrientation() {

      const overlay = document.getElementById("rotateOverlay");

      // show only on mobile portrait
      if (window.innerWidth < 900 && window.innerHeight > window.innerWidth) {
        overlay.style.display = "flex";
      } else {
        overlay.style.display = "none";
      }
    }

    window.addEventListener("load", checkOrientation);
    window.addEventListener("resize", checkOrientation);
    window.addEventListener("orientationchange", checkOrientation);

    let currentTV = "tv1";

    let tvState = {
      tv1: { power: "OFF", mute: false },
      tv2: { power: "OFF", mute: false },
      tv3: { power: "OFF", mute: false },
      tv4: { power: "OFF", mute: false },
      tv5: { power: "OFF", mute: false }
    };

    function openControlModal(tvName) {

      currentTV = tvName;

      const modal = bootstrap.Modal.getOrCreateInstance(
        document.getElementById('tvControlModal')
      );

      renderModalStatus();
      modal.show();
    }

    document.querySelectorAll('input[name="tv"]').forEach(radio => {
      radio.addEventListener('change', () => {
        openControlModal(radio.id);
      });
    });

    function renderModalStatus() {

      const tv = tvState[currentTV];

      let status = "";

      if (tv.power === "ON") status += `<span class="badge bg-success ms-2">ON</span>`;
      if (tv.power === "OFF" && tv._touched) status += `<span class="badge bg-secondary ms-2">OFF</span>`;
      if (tv.mute && tv.power === "ON") status += `<span class="badge bg-warning text-dark ms-2">MUTE</span>`;

      document.getElementById("modalSelectedTV").innerHTML =
        `Controlling: <b>${currentTV.toUpperCase()}</b> ${status}`;
    }

    function tvCommand(cmd) {

      const tv = tvState[currentTV];

      if (cmd === "ON") {
        tv.power = "ON";
        tv._touched = true;
      }

      if (cmd === "OFF") {
        tv.power = "OFF";
        tv.mute = false;
        tv._touched = true;
      }

      if (cmd === "MUTE" && tv.power === "ON") {
        tv.mute = !tv.mute;
      }

      renderModalStatus();
    }

    document.getElementById("btnOn").onclick = () => tvCommand("ON");
    document.getElementById("btnOff").onclick = () => tvCommand("OFF");
    document.getElementById("btnMute").onclick = () => tvCommand("MUTE");

  </script>

</body>

</html>
