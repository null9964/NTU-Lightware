<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>NTU Lightware
  </title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f5f7;
    }

    .main-wrapper {
      max-width: 1200px;
      margin: auto;
    }
  </style>
</head>

<body>

  <div class="container-fluid">

    <div class="row min-vh-100 justify-content-center">

      <div class="col-12 p-4 d-flex justify-content-center">

        <div class="main-wrapper w-100">

          <h1 class="text-center fw-light mb-4">
            NTU Lightware
          </h1>

          <div class="card border-0 shadow-sm rounded-4 mb-4">

            <div class="card-body p-4">

              <h3 class="mb-4 text-center">
                Input Selection
              </h3>

              <div class="row g-3" id="inputGroup">

                <div id="Desktop" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-primary w-100 rounded-4 select-btn active d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    Desktop
                  </button>

                </div>

                <div id="Laptop1" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-outline-primary w-100 rounded-4 select-btn d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    Laptop 1
                  </button>

                </div>

                <div id="Laptop2" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-outline-primary w-100 rounded-4 select-btn d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    Laptop 2
                  </button>

                </div>

                <div id="Spare" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-outline-primary w-100 rounded-4 select-btn d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    Spare
                  </button>

                </div>

                <div id="WirelessPresentation" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-outline-primary w-100 rounded-4 select-btn d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    Wireless Presentation
                  </button>

                </div>

                <div id="visualizer" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-outline-primary w-100 rounded-4 select-btn d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    Visualizer
                  </button>

                </div>

              </div>

            </div>

          </div>

          <div class="card border-0 shadow-sm rounded-4 mt-lg-5">

            <div class="card-body p-4">

              <h3 class="mb-4 text-center">
                Output Selection
              </h3>

              <div class="row g-3" id="outputGroup">

                <div id="tv1" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-primary w-100 rounded-4 select-btn active d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    TV 1
                  </button>

                </div>

                <div id="tv2" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-outline-primary w-100 rounded-4 select-btn d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    TV 2
                  </button>

                </div>

                <div id="tv3" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-outline-primary w-100 rounded-4 select-btn d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    TV 3
                  </button>

                </div>

                <div id="tv4" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-outline-primary w-100 rounded-4 select-btn d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    TV 4
                  </button>

                </div>

                <div id="tv5" class="col-12 col-sm-6 col-md-4 mb-lg-2 mb-md-2">

                  <button
                    class="btn btn-outline-primary w-100 rounded-4 select-btn d-flex align-items-center justify-content-center text-center py-3 fs-5"
                    style="min-height:90px;">
                    TV 5
                  </button>

                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script>

    function setupGroup(selector) {
      const buttons = document.querySelectorAll(selector);

      buttons.forEach(btn => {
        btn.onclick = () => {
          buttons.forEach(b => {
            b.classList.remove('btn-primary', 'active');
            b.classList.add('btn-outline-primary');
          });

          btn.classList.remove('btn-outline-primary');
          btn.classList.add('btn-primary', 'active');

          console.log("Selected:", btn.id);
        };
      });
    }

    setupGroup('#inputGroup .select-btn');
    setupGroup('#outputGroup .select-btn');


  </script>

</body>

</html>
