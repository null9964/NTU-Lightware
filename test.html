<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>AV Testing</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f5f7;
    }

    .slider-popup {
      position: fixed;

      right: 340px;
      top: 70px;

      width: 90px;
      height: 280px;

      opacity: 0;
      visibility: hidden;
      transition: .3s;

      z-index: 999;
    }

    .slider-popup.show {
      opacity: 1;
      visibility: visible;
    }

    .vertical-slider {
      writing-mode: bt-lr;
      -webkit-appearance: slider-vertical;
      width: 8px;
      height: 180px;
    }

    @media(max-width:768px) {

      .slider-popup {
        right: 100px;
        top: 140px;
        bottom: auto;
        transform: none;
      }
    }
  </style>
</head>

<body>

  <div class="container-fluid">

    <div class="row min-vh-100">

      <div class="col-md-10 p-4">

        <h1 class="text-center fw-light mb-4">
          Testing
        </h1>

        <div class="card border-0 shadow-sm rounded-4 mb-4">

          <div class="card-body p-4">

            <h3 class="mb-4">
              Input Selection
            </h3>

            <div class="row g-3" id="inputGroup">

              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-primary w-100 py-4 fs-4 rounded-4 select-btn active">
                  Desktop
                </button>

              </div>
              

              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  Laptop 1
                </button>

              </div>

              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  Laptop 2
                </button>

              </div><div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  Spare
                </button>

              </div><div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  Wireless Presentation
                </button>

              </div>

              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  Visualizer
                </button>

              </div>

            </div>

          </div>

        </div>

        <div class="card border-0 shadow-sm rounded-4">

          <div class="card-body p-4">

            <h3 class="mb-4">
              Output Selection
            </h3>

            <div class="row g-3" id="outputGroup">

              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-primary w-100 py-4 fs-4 rounded-4 select-btn active">
                  TV 1
                </button>

              </div>

              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  TV 2
                </button>

              </div>

              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  TV 3
                </button>

              </div>
              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  TV 4
                </button>

              </div>
              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  TV 5
                </button>

              </div>

              <div class="col-12 col-sm-6 col-md-4">

                <button class="btn btn-outline-primary w-100 py-4 fs-4 rounded-4 select-btn">
                  TV 6
                </button>

              </div>

            </div>

          </div>

        </div>

      </div>

      <div class="col-md-2 bg-white border-start p-3">

        <h3 class="text-center fw-light mb-4">
          Audio
        </h3>

        <div class="d-grid gap-3">

          <button class="btn btn-outline-primary py-3 fs-2 rounded-4" id="volUp">
            +
          </button>

          <button class="btn btn-outline-primary py-3 fs-2 rounded-4" id="volDown">
            −
          </button>

          <button class="btn btn-outline-danger py-3 fs-4 rounded-4" id="muteBtn">
            Mute
          </button>

        </div>

      </div>

    </div>

  </div>

  <div class="slider-popup bg-white shadow rounded-4 d-flex flex-column justify-content-center align-items-center p-3"
    id="sliderPopup">

    <input type="range" min="0" max="100" value="50" class="vertical-slider" id="volumeSlider">

    <div class="fs-4 fw-bold mt-3" id="volumeText">
      50
    </div>

  </div>

  <script>

    const popup =
      document.getElementById('sliderPopup');

    const slider =
      document.getElementById('volumeSlider');

    const text =
      document.getElementById('volumeText');

    let timer;

    function showSlider() {

      popup.classList.add('show');

      clearTimeout(timer);

      timer = setTimeout(() => {

        popup.classList.remove('show');

      }, 1000);
    }

    function updateVolume(v) {

      slider.value = v;

      text.innerText = v;

      showSlider();
    }

    document.getElementById('volUp').onclick = () => {

      updateVolume(
        Math.min(100, Number(slider.value) + 5)
      );
    };

    document.getElementById('volDown').onclick = () => {

      updateVolume(
        Math.max(0, Number(slider.value) - 5)
      );
    };

    slider.oninput = () => {

      updateVolume(slider.value);
    };

    function singleSelect(id) {

      const buttons =
        document.querySelectorAll(`#${id} .select-btn`);

      buttons.forEach(btn => {

        btn.onclick = () => {

          buttons.forEach(b => {

            b.classList.remove('btn-primary', 'active');

            b.classList.add('btn-outline-primary');
          });

          btn.classList.remove('btn-outline-primary');

          btn.classList.add('btn-primary', 'active');
        };
      });
    }

    singleSelect('inputGroup');

    singleSelect('outputGroup');

    const muteBtn =
      document.getElementById('muteBtn');

    let muted = false;

    muteBtn.onclick = () => {

      muted = !muted;

      if (muted) {

        muteBtn.classList.remove('btn-outline-danger');

        muteBtn.classList.add('btn-danger');

        muteBtn.innerText = 'Muted';

      } else {

        muteBtn.classList.remove('btn-danger');

        muteBtn.classList.add('btn-outline-danger');

        muteBtn.innerText = 'Mute';
      }
    };

  </script>

</body>

</html>
